<title>뉴밀레니엄클럽</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
       background:#f1f5f9;color:#0f172a;padding-bottom:76px;--c:#059669;--cd:#047857;--cs:#ecfdf5}
  #app{max-width:440px;margin:0 auto;min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  .card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:12px}
  .muted{color:#64748b;font-size:13px} .tiny{font-size:11px;color:#94a3b8}
  .row{display:flex;justify-content:space-between;align-items:center;padding:9px 0}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--cs);color:var(--cd);
          display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .pill{font-size:11px;padding:4px 10px;border-radius:20px;display:inline-flex;gap:4px;font-weight:700}
  .p-ok{background:#ecfdf5;color:#047857} .p-no{background:#fff1f2;color:#e11d48} .p-mid{background:#f1f5f9;color:#475569}
  .badge{font-size:10px;background:#f1f5f9;color:#64748b;padding:2px 6px;border-radius:5px}
  .icb{width:30px;height:30px;border-radius:9px;background:#f1f5f9;font-size:13px;flex-shrink:0}
  .qm{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
  .qmi{background:#fff;border-radius:16px;padding:14px 4px 11px;box-shadow:0 1px 3px rgba(0,0,0,.06);
       font-size:11px;font-weight:700;color:#334155;line-height:1.35}
  .qmi span{display:block;font-size:22px;margin-bottom:5px}
  .qmi:active{transform:scale(.96)}
  .nb{background:#ef4444;color:#fff;font-size:10px;font-weight:800;min-width:17px;height:17px;
      border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;
      margin-left:4px;vertical-align:middle;line-height:1}
  .tab{position:relative}
  .tab .nb{position:absolute;top:4px;right:50%;margin-right:-18px}
  .qmi{position:relative}
  .qmi .nb{position:absolute;top:7px;right:9px;margin:0}
  .new{background:#ef4444;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;
       margin-left:5px;vertical-align:middle}
  @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .nb,.new{animation:pop .2s ease-out}
  .icon-new{position:absolute;top:-6px;right:-8px;background:#ef4444;color:#fff;font-size:10px;
    font-weight:900;padding:3px 7px;border-radius:9px;border:2px solid #f1f5f9;letter-spacing:.5px;
    animation:pop .2s ease-out}
  .btn{background:var(--c);color:#fff;border-radius:12px;padding:9px 14px;font-size:13px;font-weight:700}

  .addbtn{width:100%;background:#fff;border-radius:18px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);
          color:#94a3b8;font-size:14px;text-align:left;margin-bottom:12px}
  .h{font-weight:800;font-size:14px;margin-bottom:8px}

  /* 로그인 */

  .gate .sub{font-size:11px;letter-spacing:.3em;color:#94a3b8;font-weight:700}
  .gate h1{font-size:30px;font-weight:900;margin:6px 0 30px;letter-spacing:-.5px}
  .code{width:100%;text-align:center;font-size:26px;letter-spacing:.5em;padding:16px;
        border:2px solid #e2e8f0;border-radius:16px;outline:none;font-weight:800}
  .code:focus{border-color:var(--c)}

  /* 대표사진 */
  .cover{position:relative;height:215px;background:var(--c);overflow:hidden;transition:height .2s}
  .cover.hero{height:270px}
  .cover img{width:100%;height:100%;object-fit:cover}
  .cover-ph{width:100%;height:100%;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;color:rgba(255,255,255,.8)}
  .shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75),rgba(0,0,0,.1) 55%,rgba(0,0,0,.4))}
  .ctop{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
  .cbot{position:absolute;bottom:0;left:0;right:0;padding:16px;color:#fff}
  .chip{background:rgba(255,255,255,.22);backdrop-filter:blur(8px);color:#fff;font-size:12px;
        padding:7px 12px;border-radius:20px;font-weight:600}
  .sync{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 9px;border-radius:20px;font-weight:700}
  .s-on{background:rgba(16,185,129,.9);color:#fff} .s-off{background:rgba(255,255,255,.25);color:#fff}

  /* 투표 */
  .votes{display:flex;gap:8px}
  .vbtn{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;background:#f1f5f9;color:#64748b}
  .vbtn.on-yes{background:#059669;color:#fff} .vbtn.on-maybe{background:#64748b;color:#fff} .vbtn.on-no{background:#f43f5e;color:#fff}

           flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}

           border:1.5px solid transparent;position:relative}

             margin-bottom:8px;display:flex;gap:11px;align-items:center;border:none}

  /* 스코어 */
  .scoretbl{width:100%;border-collapse:collapse;font-size:13px}
  .scoretbl th{font-size:11px;color:#94a3b8;font-weight:700;padding:6px 4px;text-align:center}

        align-items:center;justify-content:center;background:#f1f5f9;color:#64748b}

  /* 사진 */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .photo{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative}

  .thumb-ph{height:112px;background:var(--cs);display:flex;align-items:center;justify-content:center;font-size:30px}
  .del{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px}
  .star{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px}
  .star.on{background:#f59e0b}
  .tagbar{display:flex;gap:7px;overflow-x:auto;margin-bottom:12px}
  .tagbar::-webkit-scrollbar{display:none}
  .tag{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;background:#fff;color:#64748b;border:1px solid #e2e8f0}
  .tag.on{background:#0f172a;color:#fff;border-color:#0f172a}

  /* 탭 */
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f1f5f9;z-index:40;padding-bottom:env(safe-area-inset-bottom)}
  .tabinner{max-width:440px;margin:0 auto;display:flex}
  .tab{flex:1;padding:9px 0 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#94a3b8;font-size:10px;font-weight:600}

  .sheet{background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto}
  .sheet h3{font-size:16px;margin-bottom:14px}
  .fld{width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:11px 13px;font-size:14px;margin-bottom:10px;outline:none}
  .fld:focus{border-color:var(--c)}
  .lbl{font-size:12px;font-weight:700;color:#64748b;margin-bottom:5px;display:block}
  .seg{display:flex;gap:8px;margin-bottom:10px}
  .seg button{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;background:#f1f5f9;color:#64748b}
  .seg button.on{background:var(--c);color:#fff}
  .save{width:100%;background:var(--c);color:#fff;padding:13px;border-radius:12px;font-size:14px;font-weight:800;margin-top:4px}
  .viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px}
  .viewer img{max-width:100%;max-height:70vh;border-radius:16px}
  .hidden{display:none}
  .note{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:12px;font-size:12px;color:#78350f;line-height:1.6}
</style>

/* 전화번호 — 입력하면서 자동 하이픈 */
function fmtTel(v){
  const d=String(v||'').replace(/\D/g,'').slice(0,11);
  if(d.length<4) return d;
  if(d.startsWith('02')) return d.length<7 ? d.replace(/(\d{2})(\d+)/,'$1-$2')
    : d.replace(/(\d{2})(\d{3,4})(\d{0,4})/,'$1-$2-$3').replace(/-$/,'');
  if(d.length<8) return d.replace(/(\d{3})(\d+)/,'$1-$2');
  if(d.length===10) return d.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
  return d.replace(/(\d{3})(\d{4})(\d{0,4})/,'$1-$2-$3').replace(/-$/,'');
}
function telOK(v){ const d=String(v||'').replace(/\D/g,''); return d.length>=9 && d.length<=11; }
function onTel(el){ const p=el.selectionStart, before=el.value;
  el.value=fmtTel(el.value);
  if(p===before.length) el.setSelectionRange(el.value.length,el.value.length); }

/* 평균/베스트/랭킹 */
function stats(mid){
  const gs=D.rounds.flatMap(r=>r.scores.filter(s=>s.mid===mid).map(s=>s.gross));
  if(!gs.length) return null;
  return {n:gs.length, avg:Math.round(gs.reduce((a,b)=>a+b,0)/gs.length), best:Math.min(...gs)};
}
function ranking(){
  return D.members.map(m=>({m,s:stats(m.id)})).filter(x=>x.s)
    .sort((a,b)=>a.s.avg-b.s.avg);
}
/* 핸디캡 기준 자동 조편성 — 실력 균등 분배(스네이크 방식) */
function makeTeams(e){
  const going=D.members.filter(m=>e.votes[m.id]==='yes')
    .sort((a,b)=>(a.hdcp??20)-(b.hdcp??20));
  const n=Math.max(1,Math.ceil(going.length/4)), t=Array.from({length:n},()=>[]);
  going.forEach((m,i)=>{ const row=Math.floor(i/n), col=i%n;
    t[row%2 ? n-1-col : col].push(m.id); });
  e.teams=t.filter(x=>x.length); save(); r();
}

function readImgs(e,asCover){
  const files=[...e.target.files]; if(!files.length)return;
  Promise.all(files.map(f=>new Promise(res=>{
    const rd=new FileReader();
    rd.onload=()=>shrink(rd.result,800,src=>res({id:Date.now()+Math.random(),date:today(),
      title:f.name.replace(/\.[^.]+$/,''),tag:asCover?'대표':'새 사진',src,author:nameOf(S.me)}));
    rd.readAsDataURL(f);
  }))).then(items=>{ D.photos=[...items,...D.photos]; if(asCover)D.cover=items[0].id; save(); r(); });
  e.target.value='';
}
/* 사진 축소 — 용량 초과 방지 */
function shrink(dataUrl,max,cb){
  const img=new Image();
  img.onload=()=>{ const sc=Math.min(1,max/Math.max(img.width,img.height));
    const cv=document.createElement('canvas');
    cv.width=img.width*sc; cv.height=img.height*sc;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    cb(cv.toDataURL('image/jpeg',.75)); };
  img.onerror=()=>cb(dataUrl);
  img.src=dataUrl;
}

/* ---------- 일정: 달력 ---------- */
function vCal(){
  if(!S.calYM) S.calYM=today().slice(0,7);
  const[y,m]=S.calYM.split('-').map(Number);
  const first=new Date(y,m-1,1), startDow=first.getDay();
  const days=new Date(y,m,0).getDate();
  const todayStr=today();

  // 날짜별 이벤트 매핑
  const byDate={};
  D.events.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });

  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  while(cells.length%7) cells.push(null);

  const dow=['일','월','화','수','목','금','토'];
  const monthEvents=D.events.filter(e=>e.date.slice(0,7)===S.calYM)
    .sort((a,b)=>a.date.localeCompare(b.date));

  return `
  <div class="card" style="padding:14px 12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button class="calnav" onclick="A.calMove(-1)">‹</button>
      <div style="font-size:16px;font-weight:900">${y}년 ${m}월</div>
      <button class="calnav" onclick="A.calMove(1)">›</button>
    </div>
    <div class="calgrid calhead">
      ${dow.map((d,i)=>`<div style="color:${i===0?'#e11d48':i===6?'#2563eb':'#94a3b8'}">${d}</div>`).join('')}
    </div>
    <div class="calgrid">
      ${cells.map(ds=>{
        if(!ds) return `<div class="calcell empty"></div>`;
        const d=+ds.slice(8), dw=new Date(ds).getDay();
        const evs=byDate[ds]||[];
        const isToday=ds===todayStr, isSel=ds===S.daySel;
        return `<button class="calcell ${isToday?'today':''} ${isSel?'sel':''}" onclick="A.pickDay('${ds}')">
          <span style="color:${dw===0?'#e11d48':dw===6?'#2563eb':'#334155'}">${d}</span>
          ${evs.length?`<div class="caldots">${evs.slice(0,3).map(e=>
            `<span class="caldot" style="background:${kindOf(e).dot}"></span>`).join('')}</div>`:''}
        </button>`;
      }).join('')}
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn" style="flex:1" onclick="A.modal('event')">＋ 라운딩</button>
    <button class="btn-o" style="flex:1;font-weight:700" onclick="A.modal('gyeongjo')">＋ 경조사</button>
    <button class="btn-o" style="padding:9px 12px" onclick="A.calToday()">오늘</button>
  </div>

  ${S.daySel?vDayPopup():`
    <div class="tiny" style="text-align:center;margin:2px 0 12px">날짜를 누르면 그날 일정이 열립니다</div>
    <div class="h" style="margin-left:2px">${m}월 일정</div>
    ${monthEvents.length?monthEvents.map(e=>vEventLine(e)).join('')
      :`<div class="card" style="text-align:center;padding:30px;color:#94a3b8;font-size:14px">이번 달 일정이 없습니다</div>`}
  `}`;
}

/* 한 줄 일정 (탭하면 상세 팝업) */
function vEventLine(e){
  const k=kindOf(e);
  return `<button class="eventline" onclick="A.pickDay('${e.date}')">
    <div class="datebox" style="background:${k.dot}"><div style="font-size:10px">${+e.date.slice(5,7)}월</div>
      <div style="font-size:15px;font-weight:900">${+e.date.slice(8)}</div></div>
    <div style="flex:1;text-align:left;min-width:0">
      <div style="font-size:14px;font-weight:700">${k.emoji} ${esc(e.title)}</div>
      <div class="tiny" style="margin-top:2px">${e.time||''}${e.place?' · '+esc(e.place):''}</div>
    </div>
    <span class="pill" style="background:${k.bg};color:${k.tx}">${k.l}</span>
  </button>`;
}

/* 날짜 탭 → 그날 일정 팝업 */
function vDayPopup(){
  const evs=D.events.filter(e=>e.date===S.daySel).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const d=new Date(S.daySel), md=`${d.getMonth()+1}월 ${d.getDate()}일`;
  const dowName=['일','월','화','수','목','금','토'][d.getDay()];
  return `<div class="ov" onclick="A.closeDay()">
    <div class="sheet" onclick="event.stopPropagation()" style="max-height:82vh">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3 style="margin:0">${md} (${dowName})</h3>
        <button class="tiny" style="font-size:20px" onclick="A.closeDay()">✕</button></div>
      ${evs.length?evs.map(e=>vEventCard(e)).join('')
        :`<div style="text-align:center;padding:24px;color:#94a3b8;font-size:14px">이 날 일정이 없습니다</div>`}
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn" style="flex:1" onclick="A.modal('event')">＋ 라운딩</button>
        <button class="btn-o" style="flex:1;font-weight:700" onclick="A.modal('gyeongjo')">＋ 경조사</button>
      </div>
    </div></div>`;
}

/* 일정 상세 카드 (라운딩=투표+조편성 / 경조사=회원·부조금) */
function vEventCard(e){
  const k=kindOf(e);
  if((e.kind||'round')==='round'){
    const t=tally(e);
    const voters=Object.entries(e.votes||{}).filter(([,v])=>v);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div style="font-size:15px;font-weight:800">${k.emoji} ${esc(e.title)}</div>
        <button class="btn-o" style="padding:4px 10px;font-size:12px" onclick="A.modal('event',${e.id})">수정</button></div>
      <div class="tiny" style="margin-bottom:10px">${e.time}${e.place?' · '+esc(e.place):''}</div>
      ${vVote(e)}
      <div style="display:flex;gap:6px;margin-top:11px">
        <span class="pill p-ok">참석 ${t.yes}</span>
        <span class="pill p-mid">미정 ${t.maybe}</span>
        <span class="pill p-no">불참 ${t.no}</span></div>
      ${voters.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid #f8fafc">
        ${voters.map(([mid,v])=>{const m=D.members.find(x=>x.id===+mid);if(!m)return'';
          return `<span class="pill ${v==='yes'?'p-ok':v==='no'?'p-no':'p-mid'}">${esc(m.name)}</span>`}).join('')}</div>`:''}
      <div style="margin-top:11px;padding-top:11px;border-top:1px solid #f8fafc">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${e.teams&&e.teams.length?'8px':'0'}">
          <span style="font-size:13px;font-weight:800">조편성</span>
          <button class="btn-o" style="padding:5px 10px;font-size:12px" onclick="A.teams(${e.id})">핸디 기준 자동편성</button></div>
        ${(e.teams||[]).map((tm,i)=>`<div class="team">
          <div style="font-size:12px;font-weight:800;color:#047857;margin-bottom:5px">${i+1}조</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">
            ${tm.map(id=>{const m=D.members.find(x=>x.id===id);return m?
              `<span class="pill p-mid">${esc(m.name)} <span style="opacity:.6">${m.hdcp??'-'}</span></span>`:''}).join('')}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }
  // 경조사 카드
  const who=e.mid?D.members.find(x=>x.id===e.mid):null;
  return `<div class="card" style="background:${k.bg};border:1px solid ${k.dot}33">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div><span class="pill" style="background:${k.dot};color:#fff">${k.emoji} ${k.l}</span></div>
      <button class="btn-o" style="padding:4px 10px;font-size:12px" onclick="A.modal('gyeongjo',${e.id})">수정</button></div>
    <div style="font-size:16px;font-weight:800;color:${k.tx}">${esc(e.title)}</div>
    <div style="margin-top:8px;font-size:13px;color:#475569;line-height:1.9">
      ${who?`👤 ${esc(who.name)}${who.tel?` <span class="tiny">${esc(who.tel)}</span>`:''}<br>`:''}
      ${e.time?`🕐 ${e.time}<br>`:''}
      ${e.place?`📍 ${esc(e.place)}<br>`:''}
      ${e.gift?`💰 ${esc(e.gift)}`:''}
    </div>
    ${who&&who.tel?`<div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn-o" style="flex:1" onclick="A.call('${esc(who.tel)}')">📞 전화</button>
      <button class="btn-o" style="flex:1" onclick="A.sms('${esc(who.tel)}')">💬 문자</button></div>`:''}
  </div>`;
}

    <table class="scoretbl">

function submitM(){
  const v=id=>{const el=document.getElementById(id);return el?el.value:''};
  const t=S.modal;
  if(t==='ledger'){ const a=+v('f2')||0;
    if(!v('f1').trim()&&!a){alert('내용과 금액을 입력하세요');return}
    D.ledger.unshift({id:Date.now(),date:v('f3')||today(),type:F.type==='out'?'out':'in',
      title:v('f1').trim()||'항목',amount:a}); }
  if(t==='event'){ if(!v('f1').trim()){alert('제목을 입력하세요');return}
    if(S.mid){ const e=D.events.find(x=>x.id===S.mid);
      e.title=v('f1').trim(); e.place=v('f4').trim(); e.date=v('f3')||e.date; e.time=v('f2')||e.time; }
    else { D.events.push({id:Date.now(),date:v('f3')||today(),title:v('f1').trim(),
      time:v('f2')||'07:00',place:v('f4').trim(),kind:'round',votes:{},teams:[],author:nameOf(S.me)}); }
    D.events.sort((a,b)=>a.date.localeCompare(b.date)); }
  if(t==='gyeongjo'){ if(!v('f1').trim()){alert('제목을 입력하세요');return}
    const kk=v('gk')||'etc', mid=v('gm')?+v('gm'):null, gift=v('gg').trim();
    if(S.mid){ const e=D.events.find(x=>x.id===S.mid);
      e.kind=kk; e.title=v('f1').trim(); e.mid=mid; e.date=v('f3')||e.date;
      e.time=v('f2'); e.place=v('f4').trim(); e.gift=gift; }
    else { D.events.push({id:Date.now(),kind:kk,date:v('f3')||today(),title:v('f1').trim(),
      mid,time:v('f2'),place:v('f4').trim(),gift,votes:{},teams:[],author:nameOf(S.me)}); }
    D.events.sort((a,b)=>a.date.localeCompare(b.date)); }
  if(t==='post'){ if(!v('f1').trim()){alert('제목을 입력하세요');return}
    D.posts.unshift({id:Date.now(),author:nameOf(S.me),date:today().slice(5),
      title:v('f1').trim(),body:v('f2'),pin:document.getElementById('f3')?.checked||false}); }
  if(t==='member'){
    const nm=v('f1').trim(), tel=v('f2').trim();
    if(!nm){alert('성명을 입력하세요');return}
    if(!telOK(tel)){alert('전화번호를 정확히 입력하세요 (예: 010-1234-5678)');return}
    const dup=D.members.find(m=>m.id!==S.mid && m.tel &&
      m.tel.replace(/\D/g,'')===tel.replace(/\D/g,''));
    if(dup){alert(dup.name+' 님이 이미 같은 번호로 등록되어 있습니다');return}
    const hd=v('f4').trim()===''?null:+v('f4');
    if(S.mid){ const m=D.members.find(x=>x.id===S.mid);
      m.name=nm; m.tel=fmtTel(tel); m.role=v('f3')||'회원'; m.hdcp=hd; }
    else { D.members.push({id:Date.now(),name:nm,tel:fmtTel(tel),
      role:v('f3')||'회원',paid:false,hdcp:hd}); } }
  if(t==='round'){ if(!v('f1').trim()){alert('골프장을 입력하세요');return}
    const sc=D.members.map(m=>({mid:m.id,gross:+v('sc'+m.id)||0})).filter(x=>x.gross>0);
    if(!sc.length){alert('타수를 한 명 이상 입력하세요');return}
    if(S.mid){ const rd=D.rounds.find(x=>x.id===S.mid);
      rd.course=v('f1').trim(); rd.date=v('f3')||rd.date; rd.scores=sc; }
    else { D.rounds.unshift({id:Date.now(),date:v('f3')||today(),course:v('f1').trim(),scores:sc,author:nameOf(S.me)}); }
    D.rounds.sort((a,b)=>b.date.localeCompare(a.date)); }
  if(t==='post') markSeen('posts');
  if(t==='event'||t==='gyeongjo') markSeen('events');
  if(t==='round') markSeen('rounds');
  F={type:'in'}; S.modal=null; S.mid=null; save(); r();
}

      border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:64px">${p.emoji||'🖼'}</div>`}

  const view={home:vHome,money:vMoney,cal:vCal,score:vScore,board:vBoard,photo:vPhoto,set:vSet}[S.tab]();
  const totalNew=unread('posts')+unread('photos')+unread('events')+unread('rounds');
  document.title=(totalNew?`(${totalNew}) `:'')+'뉴밀레니엄클럽';
  app.innerHTML=vCover()+`<div style="padding:14px">${view}</div>`
    +`<div class="tabbar"><div class="tabinner">${TABS.map(([id,l,ic,key])=>{
      const n = key ? unread(key) : 0;
      return `<button class="tab ${S.tab===id?'on':''}" onclick="A.go('${id}')">${ic}<span>${l}</span>${badge(n)}</button>`;
      }).join('')}
      </div></div>`
    +(S.modal?vModal():'')+(S.viewer?vViewer():'');
}

/* ---------- 파이어베이스 연결 ---------- */
function bootFirebase(){
  firebase.initializeApp(FIREBASE_CONFIG);
  fdb=firebase.database();
  fdb.ref('club').on('value',snap=>{
    const v=snap.val();
    if(v){ pushing=true; D=v; try{localStorage.setItem('nmc',JSON.stringify(D))}catch(e){} pushing=false; r(); }
    else { fdb.ref('club').set(D).catch(()=>{}); }
  },()=>{});
}
if(LIVE){
  const s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload=()=>{ const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    s2.onload=bootFirebase; document.head.appendChild(s2); };
  document.head.appendChild(s1);
}
r();
</script>
